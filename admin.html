<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Panel - CreatorVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #FFF8FC; padding: 16px; min-height: 100vh; }
    @media (min-width: 768px) { body { padding: 20px; } }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #EC4899, #BE185D); color: white; padding: 16px 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    @media (min-width: 768px) { .header { padding: 20px 30px; margin-bottom: 30px; } }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; } }
    .stat-card { background: white; padding: 16px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    @media (min-width: 768px) { .stat-card { padding: 25px; border-radius: 20px; } }
    .stat-value { font-size: 24px; font-weight: 700; color: #EC4899; }
    @media (min-width: 768px) { .stat-value { font-size: 32px; } }
    .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    @media (min-width: 768px) { .card { padding: 25px; margin-bottom: 30px; } }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #F9A8D4; border-radius: 12px; font-size: 14px; }
    .btn-primary { background: #EC4899; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; width: 100%; }
    @media (min-width: 768px) { .btn-primary { width: auto; } }
    .btn-outline { background: transparent; border: 1px solid #EC4899; color: #EC4899; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    .btn-approve { background: #22C55E; color: white; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; margin-right: 8px; }
    .btn-reject { background: #EF4444; color: white; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
    .btn-edit { background: #3B82F6; color: white; border: none; padding: 4px 12px; border-radius: 40px; cursor: pointer; margin-right: 6px; font-size: 12px; }
    .btn-delete { background: #EF4444; color: white; border: none; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #F9A8D4; }
    @media (min-width: 768px) { th, td { padding: 12px; } }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #F9A8D4; padding-bottom: 10px; flex-wrap: wrap; }
    .tab { padding: 8px 16px; cursor: pointer; border-radius: 40px; font-size: 13px; }
    @media (min-width: 768px) { .tab { padding: 8px 24px; font-size: 14px; } }
    .tab.active { background: #EC4899; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; font-size: 13px; text-align: center; white-space: nowrap; }
    @media (min-width: 768px) { .toast { left: auto; right: 20px; transform: none; white-space: normal; } }
    .login-container { max-width: 350px; margin: 60px auto; background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    @media (min-width: 768px) { .login-container { max-width: 400px; padding: 40px; } }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .spinner { text-align: center; padding: 40px; color: #EC4899; }
    .error-msg { background: #FEE2E2; color: #DC2626; padding: 12px; border-radius: 12px; margin-bottom: 16px; text-align: center; }
  </style>
</head>
<body>

<div id="adminContent" style="display: none;">
  <div class="container">
    <div class="header">
      <h1 style="font-size: 1.4rem;"><i class="fas fa-crown"></i> Admin Panel</h1>
      <button onclick="logout()" style="background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer;">Logout</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card"><i class="fas fa-image"></i><div class="stat-value" id="totalPhotos">0</div><p style="font-size:12px;">Photos</p></div>
      <div class="stat-card"><i class="fas fa-video"></i><div class="stat-value" id="totalVideos">0</div><p style="font-size:12px;">Videos</p></div>
      <div class="stat-card"><i class="fas fa-crown"></i><div class="stat-value" id="premiumCount">0</div><p style="font-size:12px;">Premium</p></div>
      <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value" id="pendingPayments">0</div><p style="font-size:12px;">Pending</p></div>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="showTab('add')">➕ Add</div>
      <div class="tab" onclick="showTab('photos')">📸 Photos</div>
      <div class="tab" onclick="showTab('videos')">🎬 Videos</div>
      <div class="tab" onclick="showTab('payments')">💰 Payments</div>
      <div class="tab" onclick="showTab('users')">👥 Users</div>
    </div>
    
    <!-- Add Content Tab -->
    <div id="tab-add" class="tab-content active">
      <div class="card">
        <h3 style="margin-bottom:16px;">📤 Add New Content</h3>
        <div style="margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="btn-outline" onclick="setContentType('photo')" id="photoTypeBtn" style="background:#EC4899; color:white;">Photo</button>
          <button class="btn-outline" onclick="setContentType('video')" id="videoTypeBtn">Video</button>
        </div>
        
        <form id="addContentForm">
          <div class="form-group"><label>Title *</label><input type="text" id="contentTitle" required></div>
          <div class="form-group"><label>Description</label><textarea id="contentDesc" rows="2"></textarea></div>
          <div class="form-group" id="photoUrlGroup"><label>Image URL * (ImgBB, PostImages, etc.)</label><input type="text" id="contentUrl" placeholder="https://i.ibb.co/xxx/photo.jpg"></div>
          <div class="form-group" id="videoUrlGroup" style="display:none;"><label>Video URL *</label><input type="text" id="videoUrl" placeholder="https://res.cloudinary.com/xxx/video.mp4"></div>
          <div class="form-group" id="thumbnailGroup" style="display:none;"><label>Thumbnail URL *</label><input type="text" id="thumbnailUrl" placeholder="https://i.ibb.co/xxx/thumb.jpg"></div>
          <div class="form-group" id="durationGroup" style="display:none;"><label>Duration (mm:ss)</label><input type="text" id="duration" placeholder="12:34"></div>
          <div class="form-group"><label>Category</label><select id="contentCategory"><option>Photography</option><option>Urban</option><option>Art</option><option>Nature</option><option>Tutorial</option><option>BTS</option></select></div>
          <div class="form-group"><label><input type="checkbox" id="isPremium"> Premium Content (Locked for free users)</label></div>
          <button type="submit" class="btn-primary">➕ Add Content</button>
        </form>
      </div>
    </div>
    
    <!-- Photos Tab -->
    <div id="tab-photos" class="tab-content"><div class="card"><h3>📸 All Photos</h3><div id="photosList" class="spinner"><i class="fas fa-spinner fa-pulse"></i> Loading...</div></div></div>
    <div id="tab-videos" class="tab-content"><div class="card"><h3>🎬 All Videos</h3><div id="videosList" class="spinner"><i class="fas fa-spinner fa-pulse"></i> Loading...</div></div></div>
    <div id="tab-payments" class="tab-content"><div class="card"><h3>💰 Pending Payments</h3><div id="pendingList"><div class="spinner"><i class="fas fa-spinner fa-pulse"></i> Loading...</div></div></div></div>
    <div id="tab-users" class="tab-content"><div class="card"><h3>👥 All Subscribers</h3><div id="usersList" class="spinner"><i class="fas fa-spinner fa-pulse"></i> Loading...</div></div></div>
  </div>
</div>

<div id="loginContainer" class="login-container">
  <h2 style="text-align:center; margin-bottom:20px;">Admin Login</h2>
  <div id="loginError" style="color:#DC2626; margin-bottom:12px; text-align:center;"></div>
  <form id="adminLoginForm">
    <input type="email" id="adminEmail" placeholder="Email" required style="margin-bottom:12px;">
    <input type="password" id="adminPassword" placeholder="Password" required style="margin-bottom:20px;">
    <button type="submit" class="btn-primary" style="width:100%;">Login</button>
  </form>
  <p style="text-align:center; margin-top:16px; color:#666; font-size:12px;">Use admin@creatorvault.com / your password</p>
</div>

<script>
// ============================================
// SUPABASE CONFIGURATION - UPDATE THESE
// ============================================
const SUPABASE_URL = 'https://your-project.supabase.co';
const SUPABASE_ANON_KEY = 'your-anon-key';

let supabase = null;
let currentUser = null;
let contentType = 'photo';

// ============================================
// INITIALIZE
// ============================================
async function initAdmin() {
  try {
    const { createClient } = supabaseJs;
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const { data: { user }, error: userError } = await supabase.auth.getUser();
    
    if (user) {
      const { data: profile, error: profileError } = await supabase
        .from('users')
        .select('*')
        .eq('id', user.id)
        .single();
      
      if (profile && profile.role === 'admin') {
        currentUser = profile;
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        await loadAdminData();
        return;
      }
    }
    
    // Show login form
    document.getElementById('loginContainer').style.display = 'block';
    document.getElementById('adminContent').style.display = 'none';
    
  } catch (error) {
    console.error('Init error:', error);
    document.getElementById('loginContainer').style.display = 'block';
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('loginError').innerHTML = 'Connection error. Check Supabase credentials.';
  }
}

async function loadAdminData() {
  try {
    // Load stats
    const { count: photoCount } = await supabase.from('photos').select('*', { count: 'exact', head: true });
    const { count: videoCount } = await supabase.from('videos').select('*', { count: 'exact', head: true });
    const { count: premiumPhotoCount } = await supabase.from('photos').select('*', { count: 'exact', head: true }).eq('premium', true);
    const { count: premiumVideoCount } = await supabase.from('videos').select('*', { count: 'exact', head: true }).eq('premium', true);
    const { count: pendingCount } = await supabase.from('payments').select('*', { count: 'exact', head: true }).eq('status', 'pending');
    
    document.getElementById('totalPhotos').innerHTML = photoCount || 0;
    document.getElementById('totalVideos').innerHTML = videoCount || 0;
    document.getElementById('premiumCount').innerHTML = (premiumPhotoCount || 0) + (premiumVideoCount || 0);
    document.getElementById('pendingPayments').innerHTML = pendingCount || 0;
    
    // Load photos
    const { data: photos } = await supabase.from('photos').select('*').order('created_at', { ascending: false });
    if (photos && photos.length) {
      document.getElementById('photosList').innerHTML = `
        <div style="overflow-x:auto;"><table><thead><tr><th>Title</th><th>URL</th><th>Premium</th><th>Actions</th></tr></thead><tbody>
        ${photos.map(p => `<tr><td>${p.title}</td><td><a href="${p.url}" target="_blank" style="color:#EC4899;">View</a></td><td>${p.premium ? '✅' : '❌'}</td><td><button class="btn-delete" onclick="deletePhoto('${p.id}')">Delete</button></td></tr>`).join('')}
        </tbody></table></div>
      `;
    } else {
      document.getElementById('photosList').innerHTML = '<p style="text-align:center;">No photos yet. Add some!</p>';
    }
    
    // Load videos
    const { data: videos } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
    if (videos && videos.length) {
      document.getElementById('videosList').innerHTML = `
        <div style="overflow-x:auto;"><table><thead><tr><th>Title</th><th>Video</th><th>Premium</th><th>Actions</th></tr></thead><tbody>
        ${videos.map(v => `<tr><td>${v.title}</td><td><a href="${v.video_url}" target="_blank" style="color:#EC4899;">Watch</a></td><td>${v.premium ? '✅' : '❌'}</td><td><button class="btn-delete" onclick="deleteVideo('${v.id}')">Delete</button></td></tr>`).join('')}
        </tbody></table></div>
      `;
    } else {
      document.getElementById('videosList').innerHTML = '<p style="text-align:center;">No videos yet. Add some!</p>';
    }
    
    // Load pending payments
    const { data: payments } = await supabase.from('payments').select('*').eq('status', 'pending').order('created_at', { ascending: false });
    if (payments && payments.length) {
      document.getElementById('pendingList').innerHTML = payments.map(p => `
        <div style="border:1px solid #F9A8D4; border-radius:16px; padding:12px; margin-bottom:12px;">
          <div class="flex-between">
            <div><strong>${p.user_name}</strong><br>Plan: ${p.plan}<br>Transaction: ${p.transaction_id}</div>
            <div><button class="btn-approve" onclick="approvePayment('${p.id}', '${p.user_id}', '${p.plan}')">Approve</button><button class="btn-reject" onclick="rejectPayment('${p.id}')">Reject</button></div>
          </div>
        </div>
      `).join('');
    } else {
      document.getElementById('pendingList').innerHTML = '<p style="text-align:center;">No pending payments</p>';
    }
    
    // Load users
    const { data: users } = await supabase.from('users').select('*').order('created_at', { ascending: false });
    if (users && users.length) {
      document.getElementById('usersList').innerHTML = `
        <div style="overflow-x:auto;"><table><thead><tr><th>Name</th><th>Email</th><th>Membership</th><th>Expiry</th></tr></thead><tbody>
        ${users.map(u => `<tr><td>${u.full_name || 'N/A'}</td><td>${u.email}</td><td>${u.membership === 'premium' ? '✨ Premium' : 'Free'}</td><td>${u.membership_expiry ? new Date(u.membership_expiry).toDateString() : 'Never'}</td></tr>`).join('')}
        </tbody></table></div>
      `;
    } else {
      document.getElementById('usersList').innerHTML = '<p style="text-align:center;">No users yet</p>';
    }
  } catch (error) {
    console.error('Error loading data:', error);
    showToast('Error loading data', 'error');
  }
}

async function deletePhoto(id) {
  if (confirm('Delete this photo?')) {
    await supabase.from('photos').delete().eq('id', id);
    showToast('Photo deleted');
    loadAdminData();
  }
}

async function deleteVideo(id) {
  if (confirm('Delete this video?')) {
    await supabase.from('videos').delete().eq('id', id);
    showToast('Video deleted');
    loadAdminData();
  }
}

async function approvePayment(paymentId, userId, plan) {
  await supabase.from('payments').update({ status: 'approved' }).eq('id', paymentId);
  await supabase.from('users').update({ 
    membership: 'premium', 
    membership_expiry: new Date(Date.now() + 30*86400000).toISOString() 
  }).eq('id', userId);
  showToast('Payment approved! Premium activated.');
  loadAdminData();
}

async function rejectPayment(paymentId) {
  await supabase.from('payments').update({ status: 'rejected' }).eq('id', paymentId);
  showToast('Payment rejected');
  loadAdminData();
}

// Add content form submit
document.getElementById('addContentForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = document.getElementById('contentTitle').value;
  const description = document.getElementById('contentDesc').value;
  const category = document.getElementById('contentCategory').value;
  const isPremium = document.getElementById('isPremium').checked;
  
  if (contentType === 'photo') {
    const url = document.getElementById('contentUrl').value;
    if (!url) { showToast('Image URL required', 'error'); return; }
    await supabase.from('photos').insert({ title, description, url, category, premium: isPremium });
    showToast('Photo added!');
  } else {
    const videoUrl = document.getElementById('videoUrl').value;
    const thumbnailUrl = document.getElementById('thumbnailUrl').value;
    const duration = document.getElementById('duration').value;
    if (!videoUrl || !thumbnailUrl) { showToast('Video URL and Thumbnail required', 'error'); return; }
    await supabase.from('videos').insert({ title, description, video_url: videoUrl, thumbnail_url: thumbnailUrl, duration, category, premium: isPremium });
    showToast('Video added!');
  }
  
  document.getElementById('addContentForm').reset();
  setContentType('photo');
  loadAdminData();
});

function setContentType(type) {
  contentType = type;
  if (type === 'photo') {
    document.getElementById('photoUrlGroup').style.display = 'block';
    document.getElementById('videoUrlGroup').style.display = 'none';
    document.getElementById('thumbnailGroup').style.display = 'none';
    document.getElementById('durationGroup').style.display = 'none';
    document.getElementById('photoTypeBtn').style.background = '#EC4899';
    document.getElementById('photoTypeBtn').style.color = 'white';
    document.getElementById('videoTypeBtn').style.background = 'transparent';
    document.getElementById('videoTypeBtn').style.color = '#EC4899';
  } else {
    document.getElementById('photoUrlGroup').style.display = 'none';
    document.getElementById('videoUrlGroup').style.display = 'block';
    document.getElementById('thumbnailGroup').style.display = 'block';
    document.getElementById('durationGroup').style.display = 'block';
    document.getElementById('videoTypeBtn').style.background = '#EC4899';
    document.getElementById('videoTypeBtn').style.color = 'white';
    document.getElementById('photoTypeBtn').style.background = 'transparent';
    document.getElementById('photoTypeBtn').style.color = '#EC4899';
  }
}

function showToast(msg, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  document.getElementById('loginContainer').style.display = 'block';
  document.getElementById('adminContent').style.display = 'none';
  showToast('Logged out');
}

// Login form
document.getElementById('adminLoginForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPassword').value;
  
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { document.getElementById('loginError').innerHTML = error.message; return; }
    
    const { data: profile } = await supabase.from('users').select('*').eq('id', data.user.id).single();
    if (profile?.role === 'admin') {
      currentUser = profile;
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      await loadAdminData();
    } else {
      document.getElementById('loginError').innerHTML = 'Not an admin account';
      await supabase.auth.signOut();
    }
  } catch (err) {
    document.getElementById('loginError').innerHTML = 'Login failed';
  }
});

// Make functions global
window.setContentType = setContentType;
window.deletePhoto = deletePhoto;
window.deleteVideo = deleteVideo;
window.approvePayment = approvePayment;
window.rejectPayment = rejectPayment;
window.showTab = showTab;
window.logout = logout;

// Start
initAdmin();
</script>
</body>
</html>
